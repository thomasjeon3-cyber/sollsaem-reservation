name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Request to Supabase
        run: |
          # API 경로(/rest/v1/) 대신 프로젝트 루트 URL 자체를 호출하여 서버를 깨웁니다.
          curl -I "${{ secrets.SUPABASE_URL }}"
